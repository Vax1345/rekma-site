סמל נחשון מרדכי וקסמן, בן ליהודה ואסתר, נולד בירושלים בכ״ב בניסן תשל״ה (03.04.1975), השלישי מבין שבעה אחים.

נחשון למד בבית הספר היסודי ובישיבה התיכונית חורב, שם השלים את לימודיו וקיבל תעודת בגרות. היה חניך בתנועת הנוער “עזרא”, וברבות הימים הדריך חניכים צעירים. הוא עבר קורס עזרה ראשונה במד״א והתנדב שם במסירות רבה.

נחשון היה החייכן, האופטימיסט, בעל המורל הגבוה והמעודד שבחברה — גם בקרב חבריו, גם במשפחה וגם בקרב עמיתיו לנשק. הוא טיפל בהמון אהבה ובמסירות נפש באחיו הקטן רפאל, הלוקה בתסמונת דאון.

נחשון התגייס לצה״ל בראשית אוגוסט 1993, ובעקבות שני אחיו הבוגרים התנדב לגולני. למרות מבנה גופו הקטן והצנום, הוא עבר גיבוש והתקבל ליחידת “עורב” של החטיבה.

נחשון התבלט כבר בראשית דרכו בבסיס הטירונים: החיוך התמידי שלא מש מפניו לרגע — גם בעת קושי — היה התכונה הבולטת בו. חבריו לצוות מספרים שבטירונות, בזמן שהמפקדים שמרו על משמעת קפדנית ודיסטנס, נחשון הסתובב עם רס״פים וקצינים כמו חבר ותיק, עם אותו חיוך, כאילו היה חייל ותיק. “מפקדים אהבו אותו, והוא ניצל את זה. כשהיו נותנים לו עונשים היו מרחמים עליו, היו צוחקים איתו ובסוף מוותרים לו. היה קשה לעמוד מול נחשון.”

גם בקטעים הקשים — בטירונות, ואחר כך בלבנון — החיוך לא נמחק. גם לאחר שמונה שעות שמירה. מי שהכיר אותו זוכר “גולנצ’יק קטן עם חיוך וכיפה”, וכמה שהיה קטן בגופו — היה גדול ברוחו. וגם כשחבריו התקשו כבר להאמין שהוא יהיה מסוגל להמשיך, הוא הוכיח לכולם איך הכול בראש, ואיך גם קטן כמוהו מסוגל להרבה.

בבוחן מסלול, על הקיר, ניסה בעקשנות לעבור ולטפס ובסוף, בדרך לא דרך, עבר את הקיר ועלה על החבל. הוא התאמן שעות עד שהצליח. ובמסעות סחב כמו כולם מתחת לאלונקה, וגם את הטיל שהיה גדול ממנו כמעט פי שניים ושקל חצי ממשקלו — סחב אותו כמו ענק.

בנוסף דחף את חבריו להיות ביחד, לדאוג אחד לשני ולהמשיך הלאה למרות הקשיים.

נחשון רצה מאוד להיות קצין — דבר שהיה אמור להתגשם כעבור זמן קצר לאחר סיום המסלול וההכשרה כלוחם. הוא מתואר על ידי מפקדיו כחייל שהאמין בצדקת הדרך והתנדב ראשון לכל משימה; כמנהיג טבעי שרקם מערכת יחסים מיוחדת עם חבריו ועמיתיו לנשק.

נחשון היה ילד תמים, שחשב רק טוב על אחרים — דבר שלא גרם לו לחשוד במכונית שעצרה עבורו בצומת יהוד ובה נוסעים חובשי כיפות, מוזיקה חסידית בטייפ ותנ״ך וסידור מונחים על המושב.

נחשון נחטף ביום 9.10.1994 על ידי מחבלים מהחמאס והוחזק כבן ערובה במשך שישה ימים. כל המדינה התפללה ופעלה לשחרורו.

ביום שישי, י׳ בחשוון תשנ״ה (14.10.1994), נערכה פעולה צבאית בבית שבו הוחזק נחשון בביר נבאללה. מפקד הפעולה, סרן ניר פורז, ונחשון הי״ד נפלו בקרב.

במוצאי שבת, בחצות הלילה, הובא נחשון למנוחת עולמים בבית העלמין הצבאי בהר הרצל. כמאה אלף איש השתתפו בהלוויה. בן תשע עשרה היה בנופלו. הוא הועלה לדרגת סמל לאחר מותו. השאיר אחריו הורים ושישה אחים — חיים, חזי, צחי, אלי, רפאל ואוריאל.

פעולות הנצחה רבות נעשו לזכרו של נחשון: הוריו הוציאו לאור ספר לזכרו ובו דברי משפחה, חברים ומפקדים על דמותו, משולבים בשירי ארץ ישראל; ארבעה ספרי תורה נכתבו לזכרו; נחנך בית-ספר לנדידת ציפורים בלטרון על שמו ועל שם סרן ניר פורז; הוקם על שמו מרכז להבנה וסובלנות; בית-המדרש בבית-הכנסת שבו התפלל נקרא על שמו; הוקמה קרן להשאלת מכשירים נשימתיים לקשישים ותינוקות על שם נחשון וניר; והורים רבים ברחבי הארץ קראו לבניהם על שמו.

(כאן אפשר להשלים: “בירושלים ישנו בניין עבור…” — אם תשלח את שם המוסד/הבניין המדויק, אנסח את ההמשך.)
