let currentQuestions = [];
let currentQuestion = 0;
let score = 0;

window.onload = function() {
  const urlParams = new URLSearchParams(window.location.search);
  const level = urlParams.get('level');
  if (level === 'advanced') {
    startQuiz('advanced');
  } else if (level === 'easy') {
    startQuiz('easy');
  }
};

function startQuiz(level) {
  currentQuestions = level === 'easy' ? easyQuestions : advancedQuestions;
  currentQuestion = 0;
  score = 0;
  document.getElementById('quiz').style.display = 'block';
  document.getElementById('background-music').play().catch(error => console.log('אוטופליי חסום:', error));
  showQuestion();
}

function showQuestion() {
  const q = currentQuestions[currentQuestion];
  document.getElementById('question').innerHTML = q.question + ` (שאלה ${currentQuestion + 1} מתוך ${currentQuestions.length})`;
  const options = document.getElementById('options');
  options.innerHTML = '';
  q.options.forEach((option, index) => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="radio" name="answer" value="${index}"> ${option}`;
    options.appendChild(label);
  });
  document.getElementById('feedback').innerHTML = '';
}

function submitAnswer() {
  const selected = document.querySelector('input[name="answer"]:checked');
  if (selected) {
    const answer = parseInt(selected.value);
    const q = currentQuestions[currentQuestion];
    if (answer === q.answer) {
      score++;
      document.getElementById('correct-sound').play();
      document.getElementById('feedback').innerHTML = 'נכון! ' + q.explanation;
      document.getElementById('feedback').style.color = 'green';
    } else {
      document.getElementById('wrong-sound').play();
      document.getElementById('feedback').innerHTML = 'לא נכון. התשובה הנכונה היא ' + q.options[q.answer] + '. ' + q.explanation;
      document.getElementById('feedback').style.color = 'red';
    }
    currentQuestion++;
    if (currentQuestion < currentQuestions.length) {
      setTimeout(showQuestion, 4500); // עיכוב קל להצגת פידבק
    } else {
      document.getElementById('score').innerHTML = `ציון: ${score} מתוך ${currentQuestions.length}`;
      document.getElementById('background-music').pause();
    }
  } else {
    alert('בחר תשובה!');
  }
}
</script>
